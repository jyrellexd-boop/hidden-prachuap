name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: ./hidden-prachuap-local/project

      - name: Build
        run: npm run build
        working-directory: ./hidden-prachuap-local/project

      - name: Copy images to dist
        run: cp -r ./hidden-prachuap-local/project/public/images ./hidden-prachuap-local/project/dist/images

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./hidden-prachuap-local/project/dist
          keep_files: false
